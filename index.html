<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carbon & Organic Chemistry Cram Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d24;
    --border: #2a2d36;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --correct: #00c97a;
    --wrong: #ff3b5c;
    --text: #e8eaf0;
    --muted: #6b7280;
    --glow: rgba(0,229,255,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(124,58,237,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(0,229,255,0.06) 0%, transparent 50%);
  }

  /* ── TOP BAR ── */
  .top-bar {
    width: 100%;
    max-width: 760px;
    display: flex;
    justify-content: flex-end;
    margin-bottom: 12px;
    gap: 8px;
    flex-wrap: wrap;
  }

  .lang-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
    background: var(--surface);
    border: 1.5px solid var(--border);
    padding: 7px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .lang-btn:hover { border-color: var(--accent); background: rgba(0,229,255,0.06); transform: translateY(-1px); }
  .lang-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.1); }
  .flag { font-size: 15px; }

  /* ── CRAM TOOLS PANEL ── */
  .cram-toggle-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
    background: var(--surface);
    border: 1.5px solid var(--border);
    padding: 7px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .cram-toggle-btn:hover { border-color: #f59e0b; background: rgba(245,158,11,0.06); transform: translateY(-1px); }
  .cram-toggle-btn.active { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,0.1); }

  #cram-panel {
    display: none;
    width: 100%;
    max-width: 760px;
    background: var(--surface);
    border: 1px solid #f59e0b44;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 18px;
    animation: fadeUp 0.35s ease both;
    position: relative;
    overflow: hidden;
  }
  #cram-panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, #f59e0b, #ef4444, #f59e0b);
  }

  .cram-panel-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f59e0b;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cram-options {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
  }

  .cram-opt-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 16px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .cram-opt-btn:hover { border-color: #f59e0b; color: var(--text); background: rgba(245,158,11,0.06); }
  .cram-opt-btn.active { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,0.1); }
  .cram-opt-btn .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; transition: background 0.2s; }

  /* ── CHEAT SHEET ── */
  #cheat-sheet {
    display: none;
    margin-top: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    animation: fadeUp 0.3s ease both;
  }
  .cheat-heading {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f59e0b;
    margin-bottom: 12px;
  }
  .cheat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .cheat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .cheat-card .key {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .cheat-card .val {
    font-size: 0.8rem;
    color: #c4c9d4;
    line-height: 1.5;
  }

  /* ── FLASHCARD MODE ── */
  #flashcard-wrap {
    display: none;
    margin-top: 10px;
    animation: fadeUp 0.3s ease both;
  }
  .flashcard {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    perspective: 800px;
    position: relative;
    overflow: hidden;
  }
  .flashcard:hover { border-color: var(--accent); transform: translateY(-2px); }
  .fc-hint { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
  .fc-front { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.4; }
  .fc-back { display: none; font-size: 0.9rem; color: #a7f3d0; line-height: 1.5; }
  .fc-back.shown { display: block; }
  .fc-front.hidden { display: none; }
  .fc-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; gap: 8px; }
  .fc-nav-btn {
    padding: 8px 18px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .fc-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .fc-counter { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

  /* ── MNEMONICS ── */
  #mnemonics-wrap {
    display: none;
    margin-top: 10px;
    animation: fadeUp 0.3s ease both;
  }
  .mnemonic-list {
    display: grid;
    gap: 10px;
  }
  .mnemonic-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    border-radius: 0 10px 10px 0;
    padding: 12px 16px;
    font-size: 0.85rem;
    line-height: 1.5;
  }
  .mnemonic-item b { color: var(--accent); }
  .mnemonic-item em { color: #c4c9d4; font-style: normal; }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 760px;
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.6s ease both;
  }

  .badge {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.25);
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 14px;
  }

  h1 {
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
  }

  /* ── SCOREBOARD ── */
  #scoreboard {
    width: 100%;
    max-width: 760px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 22px;
    margin-bottom: 24px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .score-label { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .score-value { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

  .progress-wrap { flex: 1; margin: 0 20px; height: 6px; background: var(--border); border-radius: 100px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 100px; transition: width 0.5s ease; box-shadow: 0 0 12px var(--glow); }
  .q-counter { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--muted); white-space: nowrap; }

  /* ── QUIZ CARD ── */
  #quiz-card {
    width: 100%;
    max-width: 760px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  #quiz-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }

  /* ── HINT BAR (inline during quiz) ── */
  .hint-bar {
    display: none;
    margin-bottom: 14px;
    padding: 10px 14px;
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #c4b5fd;
    line-height: 1.5;
    letter-spacing: 0.5px;
  }
  .hint-bar.visible { display: block; animation: fadeUp 0.3s ease both; }

  .q-number { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; opacity: 0.8; }
  .q-text { font-size: 1.15rem; font-weight: 700; line-height: 1.5; margin-bottom: 28px; color: #f0f2f8; }

  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  @media (max-width: 560px) {
    .choices { grid-template-columns: 1fr; }
    #quiz-card { padding: 22px 18px; }
    .top-bar { justify-content: flex-start; }
  }

  .choice-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'Syne', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.2s;
    line-height: 1.4;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(0,229,255,0.06); transform: translateY(-2px); box-shadow: 0 4px 18px rgba(0,229,255,0.1); }
  .choice-btn:active:not(:disabled) { transform: scale(0.97); }
  .choice-letter { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; min-width: 24px; background: var(--border); border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: var(--muted); transition: background 0.2s, color 0.2s; }
  .choice-btn.correct { border-color: var(--correct); background: rgba(0,201,122,0.12); animation: pulse-green 0.4s ease; }
  .choice-btn.correct .choice-letter { background: var(--correct); color: #000; }
  .choice-btn.wrong { border-color: var(--wrong); background: rgba(255,59,92,0.12); animation: shake 0.4s ease; }
  .choice-btn.wrong .choice-letter { background: var(--wrong); color: #fff; }
  .choice-btn:disabled { cursor: default; }

  .explanation { margin-top: 18px; padding: 16px 20px; border-radius: 12px; font-size: 0.9rem; line-height: 1.6; animation: fadeUp 0.4s ease both; display: none; }
  .explanation.correct-exp { background: rgba(0,201,122,0.08); border: 1px solid rgba(0,201,122,0.25); color: #a7f3d0; }
  .explanation.wrong-exp { background: rgba(255,59,92,0.07); border: 1px solid rgba(255,59,92,0.25); color: #fca5a5; }
  .explanation b { color: #fff; font-weight: 700; }
  .exp-icon { font-size: 1.1rem; margin-right: 6px; }

  #next-btn {
    display: none;
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 24px rgba(0,229,255,0.15);
    animation: fadeUp 0.4s ease both;
  }
  #next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  #next-btn:active { transform: scale(0.98); }

  /* ── RESULT ── */
  #result-screen {
    display: none;
    width: 100%;
    max-width: 760px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 32px;
    text-align: center;
    animation: fadeUp 0.6s ease both;
    position: relative;
    overflow: hidden;
  }
  #result-screen::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent2), var(--accent)); }
  .result-emoji { font-size: 4rem; margin-bottom: 16px; display: block; }
  .result-score { font-size: 3.5rem; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
  .result-label { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 13px; margin-bottom: 20px; }
  .result-msg { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 32px; line-height: 1.5; }

  #restart-btn {
    padding: 15px 40px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff; border: none; border-radius: 12px;
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 24px rgba(0,229,255,0.2);
  }
  #restart-btn:hover { opacity: 0.9; transform: translateY(-2px); }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
  @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(0,201,122,0.4); } 100% { box-shadow: 0 0 0 12px rgba(0,201,122,0); } }
  .card-transition { animation: fadeUp 0.4s ease both; }
</style>
</head>
<body>

<!-- TOP BAR: Language + Cram Tools -->
<div class="top-bar">
  <button class="cram-toggle-btn" id="cramToggle" onclick="toggleCramPanel()">⚡ <span data-t="cramTools">Cram Tools</span></button>
  <button class="lang-btn active" id="btnEN" onclick="setLang('en')"><span class="flag">🇬🇧</span> EN</button>
  <button class="lang-btn" id="btnSV" onclick="setLang('sv')"><span class="flag">🇸🇪</span> SV</button>
</div>

<!-- CRAM TOOLS PANEL -->
<div id="cram-panel">
  <div class="cram-panel-title">⚡ <span data-t="cramTitle">Last-Minute Cram Tools</span></div>
  <div class="cram-options">
    <button class="cram-opt-btn" id="opt-hints" onclick="toggleHints()">
      <span class="dot"></span> <span data-t="optHints">Live Hints</span>
    </button>
    <button class="cram-opt-btn" id="opt-cheat" onclick="toggleCheatSheet()">
      <span class="dot"></span> <span data-t="optCheat">Key Concepts Sheet</span>
    </button>
    <button class="cram-opt-btn" id="opt-flash" onclick="toggleFlashcards()">
      <span class="dot"></span> <span data-t="optFlash">Flashcard Mode</span>
    </button>
    <button class="cram-opt-btn" id="opt-mnemonic" onclick="toggleMnemonics()">
      <span class="dot"></span> <span data-t="optMnemonic">Memory Tricks</span>
    </button>
  </div>

  <!-- KEY CONCEPTS CHEAT SHEET -->
  <div id="cheat-sheet">
    <div class="cheat-heading" data-t="cheatHeading">📋 Key Concepts Reference</div>
    <div class="cheat-grid" id="cheat-grid"></div>
  </div>

  <!-- FLASHCARD MODE -->
  <div id="flashcard-wrap">
    <div class="cheat-heading" data-t="flashHeading">🃏 Flashcard Drill — tap card to reveal</div>
    <div class="flashcard" id="flashcard" onclick="flipFlashcard()">
      <div class="fc-hint" data-t="flashTap">TAP TO REVEAL ANSWER</div>
      <div class="fc-front" id="fc-front"></div>
      <div class="fc-back" id="fc-back"></div>
    </div>
    <div class="fc-nav">
      <button class="fc-nav-btn" onclick="prevFlash()">← <span data-t="prev">Prev</span></button>
      <span class="fc-counter" id="fc-counter">1 / 10</span>
      <button class="fc-nav-btn" onclick="nextFlash()"><span data-t="next">Next</span> →</button>
    </div>
  </div>

  <!-- MNEMONICS / MEMORY TRICKS -->
  <div id="mnemonics-wrap">
    <div class="cheat-heading" data-t="mnemonicHeading">🧠 Memory Tricks & Mnemonics</div>
    <div class="mnemonic-list" id="mnemonic-list"></div>
  </div>
</div>

<header>
  <div class="badge">⚗️ <span data-t="badgeText">Chemistry Cram</span></div>
  <h1 data-t="mainTitle">Carbon & Organic Chemistry</h1>
  <p class="subtitle" data-t="subtitle">25 Questions · Instant Feedback · Randomized</p>
</header>

<div id="scoreboard">
  <div>
    <div class="score-label" data-t="scoreLabel">Score</div>
    <div class="score-value" id="score-display">0 / 0</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
  <div class="q-counter" id="q-counter">Q 1 of 25</div>
</div>

<div id="quiz-card">
  <div class="q-number" id="q-number">Question 1</div>
  <div class="hint-bar" id="hint-bar"></div>
  <div class="q-text" id="q-text"></div>
  <div class="choices" id="choices"></div>
  <div class="explanation" id="explanation"></div>
  <button id="next-btn" data-t="nextQ">Next Question →</button>
</div>

<div id="result-screen">
  <span class="result-emoji" id="result-emoji">🎉</span>
  <div class="result-score" id="result-score"></div>
  <div class="result-label" data-t="finalScore">Final Score</div>
  <div class="result-msg" id="result-msg"></div>
  <button id="restart-btn" data-t="restart">🔄 Restart Quiz</button>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// TRANSLATIONS
// ─────────────────────────────────────────────────────────────────
const TRANSLATIONS = {
  en: {
    cramTools: "Cram Tools", cramTitle: "Last-Minute Cram Tools",
    optHints: "Live Hints", optCheat: "Key Concepts Sheet",
    optFlash: "Flashcard Mode", optMnemonic: "Memory Tricks",
    cheatHeading: "📋 Key Concepts Reference", flashHeading: "🃏 Flashcard Drill — tap card to reveal",
    flashTap: "TAP TO REVEAL ANSWER", mnemonicHeading: "🧠 Memory Tricks & Mnemonics",
    badgeText: "Chemistry Cram", mainTitle: "Carbon & Organic Chemistry",
    subtitle: "25 Questions · Instant Feedback · Randomized",
    scoreLabel: "Score", finalScore: "Final Score",
    nextQ: "Next Question →", nextResults: "See Results 🏆", restart: "🔄 Restart Quiz",
    prev: "Prev", next: "Next",
    qLabel: "Question", ofLabel: "of",
    results: [
      { min: 0.92, emoji: "🏆", msg: "Outstanding! You've mastered carbon chemistry. You're ready for the exam!" },
      { min: 0.76, emoji: "⭐", msg: "Great work! Solid understanding — review a few weak spots and you'll ace it." },
      { min: 0.56, emoji: "📚", msg: "Good effort! Some concepts need more review — revisit the topics you missed." },
      { min: 0.40, emoji: "💪", msg: "Keep going! Focus on the explanations for missed questions before your exam." },
      { min: 0,    emoji: "🔬", msg: "Don't give up — start with the basics: bonding, naming, and combustion. You'll get there!" }
    ]
  },
  sv: {
    cramTools: "Pluggverktyg", cramTitle: "Sista-minuten Pluggverktyg",
    optHints: "Live-tips", optCheat: "Nyckelbegrepp",

let lang = 'en';
let questions = [];

let score = 0;

// ─────────────────────────────────────────────────────────────────
// LANGUAGE SYSTEM
// ─────────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.getElementById('btnEN').classList.toggle('active', l==='en');
  document.getElementById('btnSV').classList.toggle('active', l==='sv');
  document.documentElement.lang = l;
  applyTranslations();
  // Rebuild cram content if open
  if (cheatOpen) buildCheatSheet();
  if (mnemonicOpen) buildMnemonics();
  if (flashOpen) { buildFlashcards(); renderFlashcard(); }
  // Restart quiz in new language
  startQuiz();
}

function applyTranslations() {
  const T = TRANSLATIONS[lang];
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (T[key]) el.textContent = T[key];
  });
}

// ─────────────────────────────────────────────────────────────────
// CRAM PANEL
// ─────────────────────────────────────────────────────────────────
function toggleCramPanel() {
  cramPanelOpen = !cramPanelOpen;
  document.getElementById('cram-panel').style.display = cramPanelOpen ? 'block' : 'none';
  document.getElementById('cramToggle').classList.toggle('active', cramPanelOpen);
}

function toggleHints() {
  hintsEnabled = !hintsEnabled;
  document.getElementById('opt-hints').classList.toggle('active', hintsEnabled);
  updateHintBar();
}

function toggleCheatSheet() {
  cheatOpen = !cheatOpen;
  document.getElementById('opt-cheat').classList.toggle('active', cheatOpen);
  const el = document.getElementById('cheat-sheet');
  if (cheatOpen) { buildCheatSheet(); el.style.display = 'block'; }
  else el.style.display = 'none';
  // Close others
  if (cheatOpen) { flashOpen = false; mnemonicOpen = false; syncPanels(); }
}

function toggleFlashcards() {
  flashOpen = !flashOpen;
  document.getElementById('opt-flash').classList.toggle('active', flashOpen);
  const el = document.getElementById('flashcard-wrap');
  if (flashOpen) { buildFlashcards(); renderFlashcard(); el.style.display = 'block'; }
  else el.style.display = 'none';
  if (flashOpen) { cheatOpen = false; mnemonicOpen = false; syncPanels(); }
}

function toggleMnemonics() {
  mnemonicOpen = !mnemonicOpen;
  document.getElementById('opt-mnemonic').classList.toggle('active', mnemonicOpen);
  const el = document.getElementById('mnemonics-wrap');
  if (mnemonicOpen) { buildMnemonics(); el.style.display = 'block'; }
  else el.style.display = 'none';
  if (mnemonicOpen) { cheatOpen = false; flashOpen = false; syncPanels(); }
}

function syncPanels() {
  document.getElementById('cheat-sheet').style.display = cheatOpen ? 'block' : 'none';
  document.getElementById('opt-cheat').classList.toggle('active', cheatOpen);
  document.getElementById('flashcard-wrap').style.display = flashOpen ? 'block' : 'none';
  document.getElementById('opt-flash').classList.toggle('active', flashOpen);
  document.getElementById('mnemonics-wrap').style.display = mnemonicOpen ? 'block' : 'none';
  document.getElementById('opt-mnemonic').classList.toggle('active', mnemonicOpen);
}

function buildCheatSheet() {
  const grid = document.getElementById('cheat-grid');
  grid.innerHTML = '';
  CHEAT_DATA[lang].forEach(item => {
    const card = document.createElement('div');
    card.className = 'cheat-card';
    card.innerHTML = `<div class="key">${item.key}</div><div class="val">${item.val}</div>`;
    grid.appendChild(card);
  });
}

function buildFlashcards() {
  fcIndex = 0; fcFlipped = false;
}

function renderFlashcard() {
  const cards = FLASHCARD_DATA[lang];
  const card = cards[fcIndex];
  document.getElementById('fc-front').textContent = card.q;
  document.getElementById('fc-back').textContent = card.a;
  document.getElementById('fc-front').classList.remove('hidden');
  document.getElementById('fc-back').classList.remove('shown');
  fcFlipped = false;
  document.getElementById('fc-counter').textContent = `${fcIndex+1} / ${cards.length}`;
  // reset hint
  const tapHint = document.querySelector('.fc-hint');
  if (tapHint) tapHint.style.opacity = '1';
}

function flipFlashcard() {
  fcFlipped = !fcFlipped;
  document.getElementById('fc-front').classList.toggle('hidden', fcFlipped);
  document.getElementById('fc-back').classList.toggle('shown', fcFlipped);
}

function prevFlash() {
  const cards = FLASHCARD_DATA[lang];
  fcIndex = (fcIndex - 1 + cards.length) % cards.length;
  renderFlashcard();
}

function nextFlash() {
  const cards = FLASHCARD_DATA[lang];
  fcIndex = (fcIndex + 1) % cards.length;
  renderFlashcard();
}

function buildMnemonics() {
  const list = document.getElementById('mnemonic-list');
  list.innerHTML = '';
  MNEMONIC_DATA[lang].forEach(item => {
    const el = document.createElement('div');
    el.className = 'mnemonic-item';
    el.innerHTML = item.trick;
    list.appendChild(el);
  });
}

// ─────────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  questions = shuffle([...ALL_QUESTIONS[lang]]);
  current = 0; score = 0; answered = false;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'block';
  document.getElementById('scoreboard').style.display = 'flex';
  updateScoreboard();
  loadQuestion();
}

function updateScoreboard() {
  const T = TRANSLATIONS[lang];
  document.getElementById('score-display').textContent = `${score} / ${current}`;
  document.getElementById('q-counter').textContent = `${T.qLabel} ${current + 1} ${T.ofLabel} 25`;
  const pct = (current / 25) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function updateHintBar() {
  const hintBar = document.getElementById('hint-bar');
  if (hintsEnabled && !answered && questions[current]) {
    hintBar.textContent = '💡 ' + questions[current].hint;
    hintBar.classList.add('visible');
  } else {
    hintBar.classList.remove('visible');
  }
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  const letters = ['A', 'B', 'C', 'D'];
  const T = TRANSLATIONS[lang];

  document.getElementById('q-number').textContent = `${T.qLabel} ${current + 1} ${T.ofLabel} 25`;
  document.getElementById('q-text').textContent = q.q;

  const exp = document.getElementById('explanation');
  exp.style.display = 'none';
  exp.className = 'explanation';
  exp.innerHTML = '';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'none';
  nextBtn.textContent = current < 24 ? T.nextQ : T.nextResults;

  updateHintBar();

  const indices = shuffle([0, 1, 2, 3]);
  const correctOrigIdx = q.correct;
  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';

  indices.forEach((origIdx, pos) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.dataset.orig = origIdx;
    btn.dataset.isCorrect = origIdx === correctOrigIdx ? 'true' : 'false';
    btn.innerHTML = `<span class="choice-letter">${letters[pos]}</span>${q.choices[origIdx]}`;
    btn.addEventListener('click', () => handleAnswer(btn, q));
    choicesDiv.appendChild(btn);
  });

  const card = document.getElementById('quiz-card');
  card.classList.remove('card-transition');
  void card.offsetWidth;
  card.classList.add('card-transition');
  updateScoreboard();
}

function handleAnswer(btn, q) {
  if (answered) return;
  answered = true;
  const isCorrect = btn.dataset.isCorrect === 'true';
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.isCorrect === 'true') b.classList.add('correct');
  });

  // Hide hint after answer
  document.getElementById('hint-bar').classList.remove('visible');

  const exp = document.getElementById('explanation');
  if (isCorrect) {
    score++;
    btn.classList.add('correct');
    exp.className = 'explanation correct-exp';
    exp.innerHTML = `<span class="exp-icon">✅</span>${q.exp_correct}`;
  } else {
    btn.classList.add('wrong');
    exp.className = 'explanation wrong-exp';
    exp.innerHTML = `<span class="exp-icon">❌</span>${q.exp_wrong}`;
  }

  exp.style.display = 'block';
  document.getElementById('score-display').textContent = `${score} / ${current + 1}`;

  const nextBtn = document.getElementById('next-btn');
  const T = TRANSLATIONS[lang];
  nextBtn.textContent = current < 24 ? T.nextQ : T.nextResults;
  nextBtn.style.display = 'block';
}

document.getElementById('next-btn').addEventListener('click', () => {
  current++;
  if (current >= 25) showResults();
  else loadQuestion();
});

function showResults() {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('scoreboard').style.display = 'none';
  const T = TRANSLATIONS[lang];
  const pct = score / 25;
  const match = T.results.find(r => pct >= r.min);
  document.getElementById('result-emoji').textContent = match.emoji;
  document.getElementById('result-score').textContent = `${score} / 25`;
  document.getElementById('result-msg').textContent = match.msg;
  document.getElementById('result-screen').style.display = 'block';
  // Update restart button text
  document.getElementById('restart-btn').textContent = T.restart;
  document.querySelector('.result-label').textContent = T.finalScore;
}

document.getElementById('restart-btn').addEventListener('click', startQuiz);

// Init
applyTranslations();
startQuiz();
</script>
</body>
